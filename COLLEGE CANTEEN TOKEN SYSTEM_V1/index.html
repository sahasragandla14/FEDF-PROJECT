<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Canteen Menu</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>

        <h1>🍔 College Canteen</h1>

        <button onclick="logout()">
            Logout
        </button>

    </nav>

    <div class="hero">

        <h1>Welcome to College Canteen</h1>

        <p>
            Fast • Fresh • Delicious
        </p>

        <h2 id="welcomeUser"></h2>

    </div>

    <div class="details-box">

        <h2>Student Details</h2>

        <p>
            <strong>Name / Roll Number :</strong>
            <span id="studentName"></span>
        </p>

        <p>
            <strong>Department :</strong>
            CSE
        </p>

        <p>
            <strong>College :</strong>
            ABC Engineering College
        </p>

    </div>

    <div class="menu-section">

        <h2>🍽 Food Menu</h2>

        <div class="food-container">

            <div class="food-card">
                <h3>Veg Biryani</h3>
                <p>₹80</p>

                <button>
                    Available
                </button>
            </div>

            <div class="food-card">
                <h3>Chicken Fried Rice</h3>
                <p>₹100</p>

                <button>
                    Available
                </button>
            </div>

            <div class="food-card">
                <h3>Dosa</h3>
                <p>₹40</p>

                <button>
                    Available
                </button>
            </div>

            <div class="food-card">
                <h3>Burger</h3>
                <p>₹60</p>

                <button>
                    Available
                </button>
            </div>

            <div class="food-card">
                <h3>Pizza</h3>
                <p>₹120</p>

                <button>
                    Available
                </button>
            </div>

            <div class="food-card">
                <h3>Cool Drinks</h3>
                <p>₹30</p>

                <button>
                    Available
                </button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
