<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College Canteen</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="form-box">

            <h1>🍔 College Canteen</h1>

            <h2>Login</h2>

            <form id="loginForm">

                <input 
                    type="text"
                    id="loginUsername"
                    placeholder="Enter Name or Roll Number"
                    required
                >

                <input 
                    type="password"
                    id="loginPassword"
                    placeholder="Enter Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            <p>
                Don't have an account?
                <a href="signup.html">Signup</a>
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
