<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - College Canteen</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="form-box">

            <h1>🍕 College Canteen</h1>

            <h2>Create Account</h2>

            <form id="signupForm">

                <input 
                    type="text"
                    id="signupUsername"
                    placeholder="Enter Name or Roll Number"
                    required
                >

                <input 
                    type="password"
                    id="signupPassword"
                    placeholder="Create Password"
                    required
                >

                <input 
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required
                >

                <button type="submit">
                    Signup
                </button>

            </form>

            <p>
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
